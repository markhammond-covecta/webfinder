<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebFinder</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 44'%3E%3Cdefs%3E%3ClinearGradient id='b' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%237cc4f7'/%3E%3Cstop offset='1' stop-color='%234aa3ef'/%3E%3C/linearGradient%3E%3ClinearGradient id='f' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23a9d8fb'/%3E%3Cstop offset='1' stop-color='%235fb0f2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M3 10a4 4 0 014-4h12l5 5h26a4 4 0 014 4v3H3z' fill='url(%23b)'/%3E%3Cpath d='M3 15a4 4 0 014-4h42a4 4 0 014 4v21a4 4 0 01-4 4H7a4 4 0 01-4-4z' fill='url(%23f)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="desktop">
    <div class="window" id="window">
      <!-- Title bar / toolbar -->
      <header class="toolbar" id="toolbar">
        <div class="traffic">
          <span class="light red"></span>
          <span class="light yellow"></span>
          <span class="light green"></span>
        </div>

        <div class="nav">
          <button class="navbtn" id="backBtn" title="Back">
            <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="navbtn" id="fwdBtn" title="Forward">
            <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <div class="title" id="folderTitle">Home</div>
        <button class="navbtn pathbtn" id="pathBtn" title="Enclosing folders">
          <svg viewBox="0 0 24 24"><circle cx="4.6" cy="7" r="1.15" fill="currentColor"/><line x1="8.5" y1="7" x2="17" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="4.6" cy="12" r="1.15" fill="currentColor"/><line x1="8.5" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="4.6" cy="17" r="1.15" fill="currentColor"/><line x1="8.5" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M16.5 15.5l2.2 2.2 2.2-2.2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="spacer"></div>

        <button class="navbtn" id="sidebarToggle" title="Hide Sidebar">
          <svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="15" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="9.2" y1="4.5" x2="9.2" y2="19.5" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button class="navbtn" id="newFolderBtn" title="New Folder">
          <svg viewBox="0 0 24 24"><path d="M3 7.5A1.5 1.5 0 014.5 6h4l1.5 2h9A1.5 1.5 0 0120.5 9.5V17a1.5 1.5 0 01-1.5 1.5H4.5A1.5 1.5 0 013 17z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M16 11v4M14 13h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
        <button class="navbtn" id="trashBtn" title="Move to Trash">
          <svg viewBox="0 0 24 24"><path d="M4 7h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9 7V5.5A1.5 1.5 0 0110.5 4h3A1.5 1.5 0 0115 5.5V7" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M6.5 7l1 12.4A1.6 1.6 0 009 21h6a1.6 1.6 0 001.5-1.6L17.5 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
        <button class="navbtn" id="arrangeBtn" title="Sort by">
          <svg viewBox="0 0 24 24"><path d="M4 7h9M4 12h9M4 17h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M16.5 9.5l2 2 2-2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="toolgap"></div>

        <div class="segmented" id="viewSwitch" role="tablist">
          <button data-view="icon" title="Icon view" class="active">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </button>
          <button data-view="list" title="List view">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="4" height="3" rx="1"/><rect x="9" y="4.5" width="12" height="2" rx="1"/><rect x="3" y="10.5" width="4" height="3" rx="1"/><rect x="9" y="11" width="12" height="2" rx="1"/><rect x="3" y="17" width="4" height="3" rx="1"/><rect x="9" y="17.5" width="12" height="2" rx="1"/></svg>
          </button>
          <button data-view="column" title="Column view">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="5" height="16" rx="1.2"/><rect x="9.5" y="4" width="5" height="16" rx="1.2"/><rect x="16" y="4" width="5" height="16" rx="1.2"/></svg>
          </button>
          <button data-view="gallery" title="Gallery view">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="11" rx="1.5"/><rect x="4.5" y="17.5" width="4" height="3" rx="1"/><rect x="10" y="17.5" width="4" height="3" rx="1"/><rect x="15.5" y="17.5" width="4" height="3" rx="1"/></svg>
          </button>
        </div>

        <div class="search">
          <svg viewBox="0 0 24 24" class="searchicon"><circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" placeholder="Search" spellcheck="false" />
        </div>
      </header>

      <div class="body">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main content -->
        <main class="main" id="main" tabindex="0">
          <div class="content" id="content"></div>
        </main>
      </div>

      <!-- Status / path bar -->
      <footer class="statusbar" id="statusbar">
        <div class="pathbar" id="pathbar"></div>
        <div class="status" id="status"></div>
      </footer>
    </div>
  </div>

  <!-- Context menu -->
  <div class="contextmenu" id="contextmenu" hidden></div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="/icons.js"></script>
  <script src="/app.js"></script>
</body>
</html>
